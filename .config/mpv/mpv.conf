script-opts=ytdl_hook-ytdl_path=yt-dlp
ytdl-format=bestvideo[height<=?1080]+bestaudio/best[height<=?1080]

window-scale=1.0

volume-max=100
keep-open
screenshot-directory="/home/toytoi/Pictures/mpv"
screenshot-format=webp
screenshot-webp-lossless=yes
screenshot-high-bit-depth=yes
screenshot-sw=no

# subtitles
sub-margin-y=30
sub-auto=fuzzy
subs-with-matching-audio=yes
sub-file-paths=ass:srt:sub:subs:subtitles:subs.en:subs.ja
alang=jpn, jp
slang=jpn, jp
subs-with-matching-audio=yes

vo=gpu-next
hwdec=auto-safe
# hwdec=no
profile=high-quality
gpu-api=vulkan
# gpu-api=opengl
# profile=high-quality

fbo-format=rgba16f

# target-prim=bt.709
# target-trc=gamma2.2
# target-peak=auto
target-colorspace-hint=yes
dither-depth=auto

# osc
osc=yes
no-osd-bar
osd-bar=no
cursor-autohide=1000
osd-duration=500
osd-font-size=34
osd-spacing=0.3
osd-color="#FFFFFFFF"
osd-border-color="#80262626"
osd-shadow-offset=1.5
osd-shadow-color="#33000000"
osd-margin-x=25
osd-margin-y=22
osd-align-x=left #left|center|right
osd-align-y=top #top|center|bottom
# osd-status-msg=${time-pos} / ${duration} ${?percent-pos:(${percent-pos}%)}${?frame-drop-count:${!frame-drop-count==0:　Dropped: ${frame-drop-count}}}${?chapter: \n Chapter: ${chapter}}
osd-status-msg=${time-pos} / ${duration} ${?percent-pos:(${percent-pos}%)}${?frame-drop-count:${!frame-drop-count==0:　Dropped: ${frame-drop-count}}}${?chapter: \n Chapter: ${chapter}} | Profile: ${profile-name}
osd-bar-h=0.5                           # Float (0.1 to 50) (default: 3.125000)
osd-bar-w=99.5                          # Float (1 to 100) (default: 75.000000)
osd-bar-align-x=0                       # Float (-1 to 1) (default: 0.000000)
osd-bar-align-y=-0.988                  # Float (-1 to 1) (default: 0.500000)
osd-blur=0                              # Float (0 to 20) (default: 0.000000)
osd-border-size=2                       # Float (0 to 10) (default: 3.000000)
osd-shadow-offset=1.5
osd-shadow-color="#33000000"            # Transparent ARGB (33:20%) hex value
osd-border-color="#80262626"            # Transparent ARGB (80:50%) hex value
osd-scale-by-window=no                  # Flag (default: yes)

sub=no
sub-font-size=48
sub-color="#FFFFFFFF"
sub-border-color="#80262626"
sub-border-size=2.2
sub-shadow-offset=1.25
sub-shadow-color="#33000000"
sub-spacing=0.4
sub-scale-by-window=yes                  # Flag (default: yes)
sub-scale-with-window=yes                # Flag (default: yes)

deband=yes # Default values are 1:64:16:48
deband-iterations=1 # Range 1-16. Higher = better quality but more GPU usage. >5 is redundant.
deband-threshold=35 # Range 0-4096. Deband strength.
deband-range=20 # Range 1-64. Range of deband. Too high may destroy details.
deband-grain=5 # Range 0-4096. Inject grain to cover up bad banding, higher value needed for poor sources.

dither=ordered
dither-depth=auto
# temporal-dither=yes

# better quality
# video-sync=display-resample
video-sync=audio
# interpolation
# tscale=oversample # smoothmotion
# tscale-window=quadric
# tscale-antiring=1.0

# glsl-shader="./shaders/ArtCNN_C4F16.glsl"
# glsl-shader="./shaders/Adaptive-Sharpen.glsl"
scale=ewa_lanczos
scale-blur=0.981251
# cscale=ewa_lanczos
cscale=mitchell
cscale-blur=0.981251
dscale=catmull_rom

correct-downscaling=yes
linear-downscaling=yes

# linear-upscaling=no
# sigmoid-upscaling=no
# linear-upscaling=yes
sigmoid-upscaling=yes

scale-antiring=0.5
dscale-antiring=0.5
cscale-antiring=0.5

gpu-swapchain-depth=1
