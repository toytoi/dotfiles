; Global settings for redshift
[redshift]
; Set the day and night screen temperatures.
; A lower temperature means more red light (less blue).
temp-day=6500
temp-night=2700

; Custom dawn/dusk intervals.
; dusk-time is the start of the night transition. (Your 23:15)
; dawn-time is the start of the day transition. (The end of your 10:30 *minus* the transition time)
fade=1

; Night transition starts at 23:15, ends one hour later (00:15)
dusk-time=22:30

; Day transition starts one hour before 10:30 (09:30), ends at 10:30
dawn-time=08:30

; Set the adjustment-method: 'randr' is generally the best for Xorg.
adjustment-method=randr

; [randr] section to specify your eDP monitor if needed.
; You may not need this if you only have one monitor or want it to apply to all.
; If you need to specify a screen, find its index (usually 0).
[randr]
crtc=1
