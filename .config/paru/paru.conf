# $PARU_CONF or ~/.config/paru/paru.conf
# See paru.conf(5) for full options.

# GENERAL OPTIONS
[options]

# Core convenience and update features
BottomUp
# AUR results show first in searches (flips order for easier reading)

Devel
# Check Git-based AUR packages for updates

CleanAfter
# Auto-clean build dirs after install

Provides
# Better dependency resolution via providers (menu if multiple)

PgpFetch
# Auto-import missing PGP keys

CombinedUpgrade
# One-command full system upgrade (repo + AUR)

UseAsk
# Auto-handle pacman conflicts

SaveChanges
# Git-commit your PKGBUILD edits

UpgradeMenu
# Interactive menu to skip bad updates

NewsOnUpgrade
SudoLoop 
# Show Arch news during upgrades

# Search and limits for modern usability
SortBy = votes
# Sort by popularity (votes); alternatives: popularity, name, etc.

Limit = 75
# Cap results to avoid overload

CompletionInterval = 7
# Refresh tab-completion cache weekly

PacmanConf = /etc/pacman.conf
# Use system pacman config

NoWarn = linux linux-lts linux-zen
# Suppress common kernel warnings (space-separated)

# Optional: Advanced builds (uncomment if needed)
# LocalRepo = mylocalrepo
# For local package repo integration

# Chroot = /var/lib/archbuild
# Isolated builds for safety

# BINARY OPTIONS
[bin]

# Paths (usually auto-detected, but explicit for reliability)
# Makepkg = /usr/bin/makepkg
# Pacman = /usr/bin/pacman
# Git = /usr/bin/git
# Sudo = /usr/bin/sudo

# Flags for speed and convenience
MFlags = --nocolor --skippgpcheck
# Skip PGP if keys are managed; remove --skippgpcheck if paranoid about security

# GitFlags = --depth=1
# Shallow clones for faster AUR pulls

Pager = less -R
# Color-aware pager


# ENVIRONMENT
[env]
EDITOR = nvim
VISUAL = nvim
